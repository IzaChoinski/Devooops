name: CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: |
          cd login-app
          npm install

      - name: Build do projeto
        run: |
          cd login-app
          npm run build

      - name: Simulação de deploy
        run: echo "Deploy realizado com sucesso!"